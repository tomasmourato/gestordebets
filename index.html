<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>BetTrackr — Gestão de Apostas</title>
    <script>
      // Aplica o tema guardado antes do React montar, para não haver um
      // flash de tema claro. Espelha a lógica de src/hooks/useTheme.ts.
      (function () {
        try {
          var prefs = JSON.parse(localStorage.getItem("g_prefs") || "{}");
          var theme = prefs.theme || "system";
          var isDark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        } catch (e) {
          /* localStorage indisponível — fica o tema claro por omissão. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
